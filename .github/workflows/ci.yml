name: CI Pipeline

on: 
  push:
  pull_request:

  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4

        - name: Setup .Net
          uses: actions/setup-dotnet@v4
          with:
            dotnet-version: 9.0.x
        
        - name: Restore Dependencies
          run: dotnet Restore
          