name: CI Pipeline

on: 
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj')}}
          restore-keys: |
            nuget-${{ runner.os }}
      
      - name: Restore Dependencies
        run: dotnet restore Backend/WebshopApi/WebshopApi.csproj
      
      - name: Build
        working-directory: Backend/WebshopApi
        run: dotnet build WebshopApi.csproj --no-restore
      
      - name: check for vulnerable packages
        run: dotnet list Backend/WebshopApi/WebshopApi.csproj package --vulnerable
  analyze:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQl
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
      
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQl analysis
        uses: github/codeql-action/analyze@v4
