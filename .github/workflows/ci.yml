name: CI Pipeline

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj')}}
          restore-keys: |
            nuget-${{ runner.os }}

      - name: Restore Dependencies
        run: dotnet restore Backend/WebshopApi/WebshopApi.csproj

      - name: Build and Save Log
        working-directory: Backend/WebshopApi
        # > build-report.txt
        run: dotnet build WebshopApi.csproj --no-restore

      - name: check for vulnerable packages and save log
      # met true aan het einde, gaat de pipeline door met kwatsbaarheden
        run: dotnet list Backend/WebshopApi/WebshopApi.csproj package --vulnerable > vulnerability-report.txt || true

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: |
            Backend/WebshopApi/build-report.txt
            vulnerability-report.txt

      - name: Lint Code (Dotnet Format)
        run: dotnet format Backend/WebshopApi/WebshopApi.csproj --verify-no-changes --no-restore


  analyze:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQl
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Autobuild
        run: dotnet build Backend/WebshopApi/WebshopApi.csproj

      - name: Perform CodeQl analysis
        uses: github/codeql-action/analyze@v3
        with:
          upload: true
          output: ${{github.workspace}}/results

      - name: Upload CodeQL report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codeql-results
          path: results/*.sarif

      - name: Send Webhook Notification
        if: always()
        env:
          DISCORD_PAYLOAD: |
            {
                "content" : "🛡️ **CodeQL Analyse Voltooid**\n**Status:** ${{ job.status }}\n**Repository:** ${{ github.repository }}\n**Link naar run:** https://github.com{{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        run: |
          curl -X POST -H "application/json" \
          -d '{
            "status": "${{ job.status }}",
            "repository": "${{ github.repository }}",
            "run_id": "${{ github.run_id }}",
            "url": "https://github.com{{ github.repository }}/actions/${{ github.run_id }}"
          }' "${{ secrets.DISCORD_WEBHOOK }}"
