name: CD Pipeline

on:
    push:
        branches:
            - development

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Build Docker Image
              run: docker build -t Webshop .

            - name: Push Image
              run: docker push Webshop

            - name: Deploy
              run: kubectl apply -f k8s/
